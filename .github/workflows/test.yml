name: Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm install

      - name: Install frontend dependencies and build
        run: |
          cd src/front
          npm install
          npm run build

      - name: Run tests
        run: npm test